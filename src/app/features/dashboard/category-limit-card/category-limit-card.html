<div class="limit">
  <div class="limit-row">
    <strong>{{ total.category.name }}</strong>
    <span [class.danger]="total.isOverLimit">
      {{ money(total.total) }} / {{ money(total.category.monthlyLimit) }}
    </span>
  </div>
  <progress
    tuiProgressBar
    size="s"
    max="100"
    [value]="total.limitUsage > 100 ? 100 : total.limitUsage"
    [color]="total.isOverLimit ? '#c9524a' : total.category.color"
    [attr.aria-label]="'Использование лимита ' + total.category.name"
  ></progress>

  @if (editing) {
    <form
      class="limit-form"
      (submit)="submitLimit($event, limit.value)"
      aria-label="Изменение лимита категории"
    >
      <label>
        Новый лимит
        <input
          #limit
          type="number"
          min="0"
          step="100"
          [value]="total.category.monthlyLimit"
          [attr.aria-label]="'Новый лимит ' + total.category.name"
        />
      </label>
      <div class="limit-actions">
        <button tuiButton size="s" type="submit" [disabled]="saving">Сохранить</button>
        <button tuiButton appearance="secondary" size="s" type="button" (click)="cancelEdit.emit()">
          Отмена
        </button>
      </div>
    </form>
  } @else {
    <button
      tuiButton
      appearance="secondary"
      size="s"
      type="button"
      class="limit-edit"
      (click)="edit.emit(total.category.id)"
    >
      Изменить лимит
    </button>
  }
</div>
